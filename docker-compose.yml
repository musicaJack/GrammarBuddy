services:
  api:
    build:
      context: ./backend
      args:
        APT_MIRROR: ${DOCKER_APT_MIRROR:-mirrors.aliyun.com}
        PIP_INDEX_URL: ${DOCKER_PIP_INDEX_URL:-https://pypi.tuna.tsinghua.edu.cn/simple}
    image: grammarbuddy-api:latest
    container_name: grammarbuddy-api
    restart: unless-stopped
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000"]
    env_file:
      - ./backend/.env
    volumes:
      - ./backend/data/news_history:/app/data/news_history
    networks:
      - grammarbuddy-net

  web:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        NPM_REGISTRY: ${DOCKER_NPM_REGISTRY:-https://registry.npmmirror.com}
    image: grammarbuddy-web:latest
    container_name: grammarbuddy-web
    restart: unless-stopped
    depends_on:
      - api
    networks:
      - grammarbuddy-net
      - beingdigital-shared

networks:
  grammarbuddy-net:
    driver: bridge
  beingdigital-shared:
    external: true

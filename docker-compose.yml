services:
  api:
    build: ./backend
    image: grammarbuddy-api:latest
    container_name: grammarbuddy-api
    restart: unless-stopped
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000"]
    env_file:
      - ./backend/.env
    volumes:
      - ./backend/data/news_history:/app/data/news_history
    networks:
      - grammarbuddy-net

  web:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    image: grammarbuddy-web:latest
    container_name: grammarbuddy-web
    restart: unless-stopped
    depends_on:
      - api
    networks:
      - grammarbuddy-net
      - beingdigital-shared

networks:
  grammarbuddy-net:
    driver: bridge
  beingdigital-shared:
    external: true

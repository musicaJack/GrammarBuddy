map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name _;
    client_max_body_size 20M;

    # SPA at https://www.beingdigital.cn/GrammarBuddy/
    location /GrammarBuddy/ {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /GrammarBuddy/index.html;
    }

    location /GrammarBuddy/api/ {
        proxy_pass http://grammarbuddy-api:8000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /GrammarBuddy/health {
        proxy_pass http://grammarbuddy-api:8000/health;
    }

    location /GrammarBuddy/ws/ {
        proxy_pass http://grammarbuddy-api:8000/ws/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}

# Add inside the HTTPS server { } block in mySite ngx/conf.d/default.conf
# Place BEFORE the regex static locations (~* \.(css|js|...)$ and ~* \.html$).
#
# ^~  prevents mySite from serving /GrammarBuddy/assets/*.js from the main site root.
#
# Prerequisites:
#   - Copy deploy/mysite-nginx-map.conf → mySite ngx/conf.d/00-websocket-map.conf
#   - docker network create beingdigital-shared  (once)
#   - GrammarBuddy docker-compose joins beingdigital-shared
#   - beingdigital-website container on beingdigital-shared (already in mySite compose)

    location = /GrammarBuddy {
        return 301 /GrammarBuddy/;
    }

    location ^~ /GrammarBuddy/ {
        resolver 127.0.0.11 valid=10s;
        set $grammarbuddy_web "grammarbuddy-web:80";
        proxy_pass http://$grammarbuddy_web;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
